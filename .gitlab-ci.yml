workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - security
  - quality
  - unit
  - build

variables:
  QA_BASE_URL: ""
  QA_PRODUCT_PATH: "/products"
  NODE_ENV: "test"
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "true"

.pnpm_job:
  image: node:22-bookworm
  interruptible: true
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.29.3 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

dependency-review:
  extends: .pnpm_job
  stage: security
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never
  script:
    - pnpm audit --prod --audit-level=critical

security:
  extends: .pnpm_job
  stage: security
  script:
    - pnpm audit --prod --audit-level=moderate

secrets:
  extends: .pnpm_job
  stage: security
  needs: ["security"]
  variables:
    GIT_DEPTH: "0"
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates tar
    - curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tgz
    - tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
    - install /tmp/gitleaks /usr/local/bin/gitleaks
    - gitleaks detect --source . --verbose --redact
    - curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
    - trufflehog git file://. --only-verified --fail

lint:
  extends: .pnpm_job
  stage: quality
  needs: ["security"]
  script:
    - pnpm lint

codeql:
  stage: quality
  image:
    name: ghcr.io/github/codeql-cli/codeql-cli:v2.22.0
    entrypoint: [""]
  interruptible: true
  needs: ["security"]
  before_script: []
  script:
    - codeql version
    - codeql database create codeql-db --language=javascript --source-root .
    - codeql database analyze codeql-db --format=sarif-latest --output=codeql-results.sarif
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - codeql-results.sarif

typecheck:
  extends: .pnpm_job
  stage: quality
  needs: ["security"]
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.58.1
    - trivy fs --ignore-unfixed --severity CRITICAL,HIGH --exit-code 1 --skip-dirs node_modules .
    - pnpm typecheck

unit:
  extends: .pnpm_job
  stage: unit
  needs: ["lint", "typecheck", "codeql", "secrets"]
  script:
    - pnpm test:coverage
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - coverage/

e2e:
  extends: .pnpm_job
  stage: build
  needs: ["build"]
  rules:
    - when: never
  script:
    - pnpm build
    - pnpm playwright:install
    - pnpm test:e2e -- --reporter=line

accessibility:
  extends: .pnpm_job
  stage: build
  needs: ["build"]
  rules:
    - when: never
  variables:
    QA_BASE_URL: "http://localhost:3000"
    QA_PRODUCT_PATH: "/products"
  script:
    - pnpm build
    - pnpm start -- --hostname 127.0.0.1 --port 3000 > /tmp/storefront.log 2>&1 &
    - echo $! > /tmp/storefront.pid
    - pnpm dlx wait-on@7.2.0 http://127.0.0.1:3000 --timeout 120000 || (echo "Wait for storefront failed; tailing log" && tail -n 200 /tmp/storefront.log && exit 1)
    - if [ -f /tmp/storefront.pid ]; then kill "$(cat /tmp/storefront.pid)" || true; fi
    - pnpm run qa:a11y

build:
  extends: .pnpm_job
  stage: build
  needs: ["unit"]
  rules:
    - when: never
  script:
    - pnpm build

lighthouse:
  extends: .pnpm_job
  stage: build
  needs: ["build"]
  rules:
    - when: never
  script:
    - pnpm build
    - pnpm start -- --hostname 0.0.0.0 --port 3000 &
    - pnpm dlx wait-on@7.2.0 http://localhost:3000
    - pnpm run qa:lighthouse
